id             = "flood_ichor"
tags           = ["biological", "infection", "glowing", "flood"]
# Sickly bioluminescent green — the defining visual of the Flood
# faction. Ichor pools mark every death by an infected unit so a
# room full of Flood kills visibly reads as infected territory
# instead of the same generic red as human blood.
fresh          = "#5aff78"
dried          = "#1a5830"
state_curve    = "fresh_to_dried"
jitter         = 2
bloom_color    = "#8affa0"
bloom_radius   = 3
bloom_falloff  = 0.7
bloom_strength = 0.4
