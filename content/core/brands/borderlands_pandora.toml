# Borderlands — Pandora Bandit Raid. Cel-shaded comic violence —
# Psychos screaming with buzz-axes, Marauders laying SMG fire, Skag
# packs leaping from dunes, Goliaths tanking shotgun blasts, Nomad
# warchiefs howling to rally the pack, Suicide Psychos running at
# you with lit grenades. The "loot-and-yell" brand — pure tonal
# counterweight to the horror brands.
#
# Converted to BrandUnit authoring shape.

id = "borderlands_pandora"
name = "Borderlands — Pandora Bandit Raid"
description = "Psychos scream, Skags leap, Badass variants won't die, suicide Psychos ignite."

spawn_pool = [
    "psycho",
    "marauder",
    "goliath",
    "skag",
    "suicide_psycho",
    "badass_goliath",
    "nomad",
]
miniboss = "badass_goliath"

signature_traversal = "blink"
signature_perks = ["butcher", "rampage", "quick_hands"]

[spawn_weights]
psycho = 5
skag = 3
goliath = 2
marauder = 3
suicide_psycho = 2
badass_goliath = 1
nomad = 1

# ═══════════════════════════════════════════════════════════════════
# Unit roster.
# ═══════════════════════════════════════════════════════════════════

# Psycho — buzz-axe screaming sprinter. Rusher-backed, bumped speed
# for the committed sprint, a little more HP because Psychos absorb
# more than bandit grunts.
[units.psycho]
archetype = "rusher"
display_name = "Psycho"
hp = 70
speed = 26.0
touch_damage = 14
sprite = "psycho.art"
[units.psycho.palette]
D = "#0a0a0a"
M = "#f0f0e8"
E = "#101010"
B = "#e8a060"
A = "#b85020"
X = "#808080"

# Marauder — goggled SMG bandit. Marksman-backed with an SMG-burst
# profile (fast, wide, short-range). Wears the "Badass" goggle +
# bandit mask silhouette.
[units.marauder]
archetype = "marksman"
display_name = "Marauder"
hp = 70
speed = 13.0
ranged_damage = 6
preferred_distance = 26.0
sprite = "marauder.art"
[units.marauder.palette]
D = "#0a0a0a"
B = "#e8b038"
E = "#40e0ff"
G = "#202020"
J = "#8a4020"
R = "#303030"
[units.marauder.ranged_profile]
# SMG spray — 5-round fast burst, quick reload. Different from
# Tarkov Operator AK (3-round at 0.14) by having wider burst but
# less per-round damage.
tell = 0.2
shot_cooldown = 0.1
mag_size = 5
reload = 1.8

# Goliath — caged-helmet tank. Charger-backed with big HP for the
# "enrage when you knock off the helmet" Borderlands moment.
[units.goliath]
archetype = "charger"
display_name = "Goliath"
hp = 180
speed = 20.0
touch_damage = 24
sprite = "goliath.art"
[units.goliath.palette]
D = "#0a0a0a"
H = "#808080"
E = "#ff3020"
B = "#f0a830"
A = "#b8601a"

# Skag — quadruped hinged-jaw pack beast. Leaper-backed for the
# mid-air lunge.
[units.skag]
archetype = "leaper"
display_name = "Skag"
hp = 55
speed = 18.0
touch_damage = 22
sprite = "skag.art"
[units.skag.palette]
D = "#0a0a0a"
B = "#d87030"
M = "#8a1a10"
E = "#ffe030"
S = "#403020"

# Suicide Psycho — grenade-strapped screamer. Sapper-backed; detonates
# on contact in a breach-style explosion.
[units.suicide_psycho]
archetype = "sapper"
display_name = "Suicide Psycho"
hp = 40
speed = 22.0
sprite = "suicide_psycho.art"
[units.suicide_psycho.palette]
D = "#0a0a0a"
M = "#f0f0e8"
E = "#101010"
B = "#e8a060"
G = "#50a030"
X = "#ff4020"

# Badass Goliath — the miniboss. Pinkie-backed with absurd HP — the
# "you emptied a full mag into it, why is it still running" moment.
[units.badass_goliath]
archetype = "pinkie"
display_name = "Badass Goliath"
hp = 380
speed = 18.0
touch_damage = 30
[units.badass_goliath.palette]
D = "#0a0a0a"
H = "#a8a8a8"
E = "#ff2020"
B = "#f8c040"
A = "#c86820"
T = "#806030"
W = "#ffe060"
