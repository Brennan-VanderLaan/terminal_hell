# Halo — Covenant Strike. The main Halo combat experience: Grunt
# squads with plasma pistols, Jackal snipers behind shield gauntlets,
# Elites closing with plasma rifles + personal shields, Brute
# Chieftains roaring gravity hammers, Hunters paired with fuel-rod
# cannons. Disciplined alien military — distinct from the Flood
# brand's conversion-horror flavor.
#
# Converted to BrandUnit authoring shape. Jackal Snipers get the
# precise-beam-rifle profile (single deliberate shot, long range).
# Elites get a plasma rifle burst cadence. Both are Marksman-adjacent
# archetypes but the ranged profiles make them feel like different
# weapons.

id = "halo_covenant"
name = "Halo — Covenant Strike"
description = "Grunt squads, Jackal snipers, Elites closing behind shields, Brute chargers."

spawn_pool = [
    "grunt",
    "jackal_sniper",
    "jackal_shield",
    "elite_minor",
    "brute_chieftain",
    "hunter_fuel_rod",
    "shade_turret",
]
miniboss = "elite_zealot"

signature_traversal = "blink"
signature_perks = ["rampage", "quick_hands", "survivor"]

[spawn_weights]
grunt = 5
jackal_sniper = 3
jackal_shield = 2
elite_minor = 3
brute_chieftain = 2
hunter_fuel_rod = 1
shade_turret = 1

# ═══════════════════════════════════════════════════════════════════
# Unit roster.
# ═══════════════════════════════════════════════════════════════════

# Grunt — squat orange methane-breather. Swarmling-backed, the
# "dozens running in panic when the Elite dies" Halo moment.
[units.grunt]
archetype = "swarmling"
display_name = "Unggoy Grunt"
hp = 22
speed = 20.0
touch_damage = 6
sprite = "grunt.art"
[units.grunt.palette]
H = "#ffa040"
B = "#c05010"
E = "#ffe678"
T = "#3a5a74"
A = "#2a2218"
D = "#1a0a04"

# Jackal Sniper — scoped beam rifle behind a perch. Marksman-backed
# with a precise long-range single-shot profile. Very similar to
# Scav Sniper / UNSC — that's the point; the player reads Jackal
# by the purple carapace silhouette.
[units.jackal_sniper]
archetype = "marksman"
display_name = "Kig-Yar Sniper"
hp = 50
speed = 8.0
ranged_damage = 40
preferred_distance = 110.0
sprite = "jackal_sniper.art"
[units.jackal_sniper.palette]
H = "#6a2890"
B = "#8a38b0"
E = "#ff3040"
W = "#3c2040"
S = "#202028"
D = "#2a1034"
A = "#1a0820"
[units.jackal_sniper.ranged_profile]
tell = 0.95
shot_cooldown = 3.6
mag_size = 1
reload = 0.0

