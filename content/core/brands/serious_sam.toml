# Serious Sam — Endless Horde. Dozens on screen, headless screamers,
# swarms of fast cheap enemies. Play like a wide circle saw.
#
# Converted to BrandUnit authoring shape. Every unit leans into the
# canonical Sam bestiary silhouette — headless kamikazes, bronze
# werebulls, rocketeer torsos, Kleer skeletons, sirian harpies.

id = "serious_sam"
name = "Serious Sam — Endless Horde"
description = "Dozens at once. Circular strafing or death."

spawn_pool = [
    "beheaded_kamikaze",
    "beheaded_rocketeer",
    "werebull",
    "kleer_skeleton",
    "sirian_harpy",
    "marsh_hopper",
    "scythian_witch",
]
miniboss = "biomechanoid_major"

signature_traversal = "slide"
signature_perks = ["adrenaline", "rampage", "quick_hands"]

[spawn_weights]
beheaded_kamikaze = 7
beheaded_rocketeer = 3
werebull = 2
kleer_skeleton = 3
sirian_harpy = 1
marsh_hopper = 3
scythian_witch = 1

# ═══════════════════════════════════════════════════════════════════
# Unit roster.
# ═══════════════════════════════════════════════════════════════════

# Beheaded Kamikaze — stump-neck screamer with bombs each hand.
# Rusher-backed with extra speed (they SCREAM and SPRINT).
[units.beheaded_kamikaze]
archetype = "rusher"
display_name = "Beheaded Kamikaze"
hp = 45
speed = 30.0
touch_damage = 8
sprite = "beheaded_kamikaze.art"
[units.beheaded_kamikaze.palette]
B = "#d8a848"
D = "#6a4818"
N = "#c01818"
F = "#2a2a2e"
H = "#ff4020"

# Beheaded Rocketeer — headless torso with twin launcher tubes.
# Rocketeer-backed — the canonical rocket-arc threat.
[units.beheaded_rocketeer]
archetype = "rocketeer"
display_name = "Beheaded Rocketeer"
hp = 70
speed = 10.0
preferred_distance = 40.0
sprite = "beheaded_rocketeer.art"
[units.beheaded_rocketeer.palette]
B = "#d8a848"
D = "#6a4818"
N = "#c01818"
R = "#3a3c40"
[units.beheaded_rocketeer.ranged_profile]
tell = 0.5
shot_cooldown = 2.0
mag_size = 1
reload = 0.0

# Werebull — bronze biomech bull with horns. Charger-backed, high speed,
# committed linear charge.
[units.werebull]
archetype = "charger"
display_name = "Werebull"
hp = 130
speed = 30.0
touch_damage = 28
sprite = "werebull.art"
[units.werebull.palette]
B = "#c89438"
D = "#5a3810"
E = "#ff3020"
H = "#f0e4b0"
A = "#402010"
M = "#886028"

# Kleer Skeleton — stark bone frame with spiked ball-and-chain mace.
