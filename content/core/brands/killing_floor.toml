# Killing Floor — Zed Outbreak. Literal genre-sibling brand: timed
# waves of Clots, Gorefasts, Stalkers, Husks, Sirens, Fleshpounds
# escalating toward a boss. The "stay on the trader timer, mind the
# husks" brand.

id = "killing_floor"
name = "Killing Floor — Zed Outbreak"
description = "Clots grab, Gorefasts rush, Sirens scream, Husks burn. The Patriarch is coming."

spawn_pool = ["rusher", "charger", "leaper", "howler", "sapper", "pinkie"]
miniboss = "miniboss"

# Medic-syringe dash fantasy → Dash. Perks lean into the KF loop:
# QuickHands because every weapon benefits from rate-of-fire perk in
# KF, CorpsePulse for the "heal off the kills" feel, LastStand for
# the "down to red, headshot the Husk, survive" moments.
signature_traversal = "dash"
signature_perks = ["quick_hands", "corpse_pulse", "last_stand"]

[spawn_weights]
# Clots — the grabby horde staple.
rusher = 5
# Gorefast / Bloat charge.
charger = 4
# Stalker / Crawler pounce — cloaking ambushers. Bumped.
leaper = 4
# Siren scream — noise-caller pulling the rest of the wave in.
howler = 2
# Husk flamer + Sirens' scream suicide-detonate-style feel.
sapper = 2
# Fleshpound — the bullet-sponge big hit.
pinkie = 1

# ── Brand sprite overrides ─────────────────────────────────────────
# KF zeds — sickly green flesh, exposed bone, charred husks, iron
# gauntlet fleshpounds. Art files live in content/core/art/killing_floor/.

[sprite_overrides]
rusher = "clot.art"
charger = "gorefast.art"
pinkie = "fleshpound.art"
sapper = "husk.art"

# Clot — gray-green grabby shambler, pleading arms outstretched.
[sprite_palettes.rusher]
B = "#8ca878"
D = "#3e5438"
E = "#e84040"
F = "#1a1008"
