# Starving Rats — Undercity Vermin.
#
# Plague swarm on team "swarm", hostile to every living faction —
# survivors, horde, flood, parasite. Unlike Flood (which converts
# hosts to its side), rats EAT hosts: the Consume primitive's
# growth_into/growth_threshold fields turn a Rat into a DireRat
# after 30 HP of consumed fodder.
#
# Converted to BrandUnit authoring shape. Rat behavior lives in the
# archetype TOML (rat + dire_rat already define their Consume +
# growth_into blocks); these unit entries just bind the brand-local
# display names + the direct-spawn swarmling that fills the wave
# between rat bursts.

id = "starving_rats"
name = "Starving Rats — Undercity Vermin"
description = "Plague rats that eat everything, grow larger with every meal."

spawn_pool = [
    "plague_rat",
    "dire_rat",
    "roach_swarm",
]
miniboss = "dire_rat"

signature_traversal = "dash"
signature_perks = ["iron_will", "survivor", "quick_hands"]

[spawn_weights]
plague_rat = 12
dire_rat = 1
roach_swarm = 4

# ═══════════════════════════════════════════════════════════════════
# Unit roster.
# ═══════════════════════════════════════════════════════════════════

# Plague Rat — the base vermin. Rat archetype (carries Consume +
# growth_into = "dire_rat"). Sprite + name branded; stats inherit.
[units.plague_rat]
archetype = "rat"
display_name = "Plague Rat"

# Dire Rat — grown form. DireRat archetype (the growth target). Most
# DireRats in play will have grown via Consume rather than direct
# spawn, but the direct spawn at weight=1 adds variety.
[units.dire_rat]
archetype = "dire_rat"
display_name = "Dire Rat"

# Roach Swarm — the non-rat filler body. Swarmling-backed so the
# swarm doesn't read as pure rats when density goes up.
[units.roach_swarm]
archetype = "swarmling"
display_name = "Roach Swarm"
