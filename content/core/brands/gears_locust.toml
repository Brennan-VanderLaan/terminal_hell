B = "#3a4238"
D = "#1a1e1a"
E = "#ff4040"
A = "#4a5246"
R = "#b8a078"
C = "#a01820"
[units.theron_guard.ranged_profile]
tell = 1.2
shot_cooldown = 3.4
mag_size = 1
reload = 0.0

