# Gears of War — Locust Emergence. Ground-level horde rising out of
# emergence holes: Drones with Lancers, Therons with torque bows,
# Wretches scuttling low, Boomers lobbing grenades, Tickers as walking
# bombs, Bloodmounts as mounted chargers, Berserkers smashing walls.
# Chainsaw bayonets, cover-to-cover, roadie-run energy.
#
# Converted to BrandUnit authoring shape.

id = "gears_locust"
name = "Gears of War — Locust Emergence"
description = "Drones with Lancers, Wretches scuttling, Boomers lobbing, Berserkers smashing walls."

spawn_pool = [
    "locust_drone",
    "theron_guard",
    "wretch",
    "boomer",
    "ticker",
    "bloodmount",
    "corpser",
]
miniboss = "berserker"

signature_traversal = "slide"
signature_perks = ["survivor", "butcher", "adrenaline"]

[spawn_weights]
locust_drone = 4
theron_guard = 4
wretch = 4
bloodmount = 3
boomer = 3
corpser = 2
ticker = 1

# ═══════════════════════════════════════════════════════════════════
# Unit roster.
# ═══════════════════════════════════════════════════════════════════

# Locust Drone — chunky-plated grunt with Lancer. PMC-backed with a
# Lancer burst-fire profile (5-round chainsaw-rifle bursts).
[units.locust_drone]
archetype = "pmc"
display_name = "Locust Drone"
hp = 200
speed = 11.0
touch_damage = 22
ranged_damage = 6
preferred_distance = 24.0
sprite = "locust_drone.art"
[units.locust_drone.palette]
H = "#d8d2b8"
B = "#4a5246"
D = "#1e241f"
E = "#ff3030"
A = "#6a7265"
R = "#2a2a2a"
T = "#8a6030"
C = "#a01820"
[units.locust_drone.ranged_profile]
# Lancer assault rifle — 5-round bursts, modest reload.
tell = 0.25
shot_cooldown = 0.12
mag_size = 5
reload = 1.8

# Theron Guard — hooded torque-bow sniper. Marksman-backed with a
# slow arcing torque-bow profile (long wind-up, heavy damage).
[units.theron_guard]
archetype = "marksman"
display_name = "Theron Guard"
hp = 75
speed = 9.0
ranged_damage = 34
preferred_distance = 80.0
sprite = "theron_guard.art"
[units.theron_guard.palette]
