# Gears of War — Locust Emergence. Ground-level horde rising out of
# emergence holes: Drones with Lancers, Wretches scuttling low,
# Boomers lobbing grenades, Berserkers smashing walls, Kantus
# support. Chainsaw bayonets, cover-to-cover combat, roadie-run
# energy. The "bullet sponge + brutal melee" brand.

id = "gears_locust"
name = "Gears of War — Locust Emergence"
description = "Drones with Lancers, Wretches scuttling, Boomers lobbing, Berserkers smashing walls."

spawn_pool = [
    "pmc",
    "marksman",
    "leaper",
    "rocketeer",
    "breacher",
    "sapper",
    "pinkie",
    "charger",
]
miniboss = "pinkie"

# Roadie run + shoulder-charge through cover → Slide. Perks are Delta
# Squad kit: Survivor armor, Butcher because every Locust drops a
# weapon, Adrenaline for the "close the gap with the chainsaw"
# moments.
signature_traversal = "slide"
signature_perks = ["survivor", "butcher", "adrenaline"]

[spawn_weights]
# Locust Drone — rifles + numbers.
pmc = 4
# Theron Guard sniper / Sharpshooter — long-range torque bows.
marksman = 4
# Wretch — scuttling leaper from the emergence hole. Bumped so the
# jump-from-emergence-hole moment lands every wave.
leaper = 4
# Bloodmount charge — committed bowling rush.
charger = 3
# Boomer / Mauler — shoulder-launcher lobs from standoff distance.
rocketeer = 3
# Kantus / Corpser — digs through walls.
breacher = 2
# Tickers — walking bombs.
sapper = 1
# Berserker — blind, smashes walls, huge HP pool.
pinkie = 1

# Brand-specific sprite overrides. Drones with chunky plated armor +
# Lancer rifles, Therons in hooded robes with torque bows, Wretches
# scuttling low, Boomers with shoulder cannons, blind Berserkers
# with crested spikes. Palette: grim gray-green armor, bone-pale
# horns, crimson emergence-omen accents.
[sprite_overrides]
pmc = "locust_drone.art"
marksman = "theron_guard.art"
leaper = "wretch.art"
rocketeer = "boomer.art"
pinkie = "berserker.art"

