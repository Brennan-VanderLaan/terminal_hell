# Warhammer 40K — Tyranid Hive Fleet. Biomass fantasy at its purest.
# Termagants by the hundreds with spitter fleshborers, Hormagaunts
# leaping scythes-first, Warriors anchoring waves, Zoanthropes floating
# overhead pulsing psychic bolts, Lictors ambushing, Rippers cascading,
# Carnifex charging. The "consume everything" brand.
#
# Converted to BrandUnit authoring shape.

id = "tyranid_swarm"
name = "Warhammer 40K — Tyranid Hive Fleet"
description = "Termagants. Hormagaunts. Warriors. Zoanthropes. The swarm consumes."

spawn_pool = [
    "termagant",
    "hormagaunt",
    "tyranid_warrior",
    "zoanthrope",
    "ripper",
    "lictor",
    "fleshborer_termagant",
    "lictor_shriek",
]
miniboss = "carnifex"

signature_traversal = "dash"
signature_perks = ["survivor", "rampage", "gloom_shroud"]

[spawn_weights]
termagant = 8
hormagaunt = 6
tyranid_warrior = 3
zoanthrope = 2
ripper = 3
lictor = 3
fleshborer_termagant = 2
lictor_shriek = 1

# ═══════════════════════════════════════════════════════════════════
