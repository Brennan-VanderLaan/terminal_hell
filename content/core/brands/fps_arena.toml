# FPS arena lineage: Doom / Quake / UT / Soldat / Duke / Serious Sam.
# Fast aggressive enemies, mixed melee + one ranged archetype.
#
# The wave director consults `spawn_pool` for which archetypes this brand
# bleeds in, with per-archetype scaling rules in `scaling`. Archetypes are
# matched by name against `content/core/archetypes.toml` — unknown names
# will fail to load at startup rather than silently drop.

id = "fps_arena"
name = "FPS Arena Lineage"
description = "Doom-kin imps and pinkies, a ranged skeleton, chargers that sprint."

# Archetypes in the regular horde budget.
spawn_pool = ["rusher", "pinkie", "charger", "revenant"]

# One per miniboss wave.
miniboss = "miniboss"

[scaling]
# Rushers: flat ramp. Every wave w spawns `base + w * per_wave` rushers.
base_rushers = 4
rushers_per_wave = 2

# Pinkies show up at wave >= start; count grows slowly.
pinkie_start_wave = 3
pinkie_base = 1
pinkie_scale_denom = 2

# Chargers show up later but scale similarly.
charger_start_wave = 4
charger_base = 1
charger_scale_denom = 3

# Revenants (ranged) are rarer to protect pacing.
revenant_start_wave = 5
revenant_base = 1
revenant_scale_denom = 4

# Relative spawn weights within a wave (higher = more likely per pick).
[spawn_weights]
rusher = 4
pinkie = 2
charger = 2
revenant = 1
