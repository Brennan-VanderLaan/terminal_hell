# Half-Life — Black Mesa Incident. Two flavors in one brand: Xen
# biology (headcrabs that turn marines into zombies) + Combine
# paramilitary (Overwatch, Metrocops). The conversion chain mirrors
# our Floodling system — parasites convert fodder into stronger
# zombies. The "cascade was your fault" brand.

id = "half_life"
name = "Half-Life — Black Mesa Incident"
description = "Headcrabs convert, zombies stagger, Combine close in with rifles."

spawn_pool = [
    "headcrab",
    "zombie",
    "marksman",
    "pmc",
    "leaper",
]
miniboss = "pmc"

# Long-jump module + gravity-gun lore → Blink. Perks lean tactical:
# QuickHands (9mm AR cadence), Survivor (HEV suit plates), IronWill
# (the anomalous materials drain sanity).
signature_traversal = "blink"
signature_perks = ["quick_hands", "survivor", "iron_will"]

[spawn_weights]
# Headcrab parasites — leap-attach → zombie conversion after gestation.
# B4 upgraded from skinned Floodlings to the dedicated Headcrab
# archetype so the brand's canonical behavior lives in its own registry
# entry, not shared with the Flood faction.
headcrab = 4
# Converted shamblers — marines post-gestation. Dedicated Zombie
# archetype replaces the skinned Rusher so its stats + behavior are
# self-describing and can be tuned without touching Rusher.
zombie = 3
# Combine Soldier / Metrocop — ranged riflemen.
marksman = 3
# Elite Combine / Overwatch — heavier armored push.
pmc = 2
# Fast Zombie / Houndeye pounce.
leaper = 2

# ── Brand sprite overrides ─────────────────────────────────────────
# Half-Life: Xen biology (headcrab crown) + Combine paramilitary
# (cold blue-black armor, orange visor slit). Art lives in
# content/core/art/half_life/.

[sprite_overrides]
zombie = "headcrab_zombie.art"
marksman = "combine_soldier.art"
pmc = "combine_elite.art"
headcrab = "headcrab.art"
leaper = "fast_zombie.art"

