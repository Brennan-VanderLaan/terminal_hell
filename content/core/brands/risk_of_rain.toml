# Risk of Rain — Escalating Chaos. Starts calm, ramps to chaos. Fast
# Lemurians throwing fireballs, Greater Wisps + Jellyfish floating
# overhead, Elder Lemurians breathing columns of flame, Magma Worms
# burrowing, Parents teleporting, Imp Overlords committing charges.
#
# Converted to BrandUnit authoring shape with the RoR2 canon roster.

id = "risk_of_rain"
name = "Risk of Rain — Escalating Chaos"
description = "Slow boil. Each wave is messier than the last."

spawn_pool = [
    "lemurian",
    "elder_lemurian",
    "greater_wisp",
    "jellyfish",
    "magma_worm",
    "parent",
    "imp",
    "beetle",
]
miniboss = "stone_titan"

signature_traversal = "dash"
signature_perks = ["rampage", "bloodhound", "butcher"]

[spawn_weights]
lemurian = 3
elder_lemurian = 3
greater_wisp = 2
jellyfish = 3
magma_worm = 2
parent = 2
imp = 3
beetle = 3

# ═══════════════════════════════════════════════════════════════════
# Unit roster.
# ═══════════════════════════════════════════════════════════════════

# Lemurian — bipedal fire-lizard chucking fireballs. Rusher-backed for
# the "close and bite" melee fallback; orange scales + fireball arc.
[units.lemurian]
archetype = "rusher"
display_name = "Lemurian"
hp = 60
speed = 22.0
touch_damage = 12
sprite = "lemurian.art"
[units.lemurian.palette]
H = "#ffc060"
B = "#d05820"
E = "#fff0a0"
D = "#401808"
F = "#ff8020"
C = "#6a2810"

# Elder Lemurian — big purple lizard, breath-fire charge. Charger-
# backed; the "oh no it's red" escalation moment.
[units.elder_lemurian]
archetype = "charger"
display_name = "Elder Lemurian"
hp = 160
speed = 22.0
touch_damage = 26
sprite = "elder_lemurian.art"
[units.elder_lemurian.palette]
H = "#d8a040"
B = "#6820a0"
E = "#ffe080"
D = "#2a0838"
F = "#ff6030"
C = "#3a1050"

