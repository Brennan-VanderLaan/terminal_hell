# Aliens — Xenomorph Hive Infestation. Facehuggers convert, Drones
# skitter out of ceiling vents, Warriors flank in packs, Carriers
# burst into more Facehuggers, the Queen looms. Black-biomechanical
# nightmare with the same conversion engine the Flood brand uses but
# a tighter, more claustrophobic texture.
#
# Converted to BrandUnit authoring shape. Each unit ties an LV-426-
# canonical silhouette to the backing sim archetype that gives it the
# right sim feel (Floodling conversion for facehuggers, Leaper pounce
# for the warrior skitter, Phaser flicker for the ceiling-drop).

id = "xenomorph_hive"
name = "Aliens — Xenomorph Hive"
description = "Facehuggers convert, warriors flank, carriers burst. The hive breathes."

spawn_pool = [
    "facehugger",
    "xeno_drone",
    "xeno_warrior",
    "chestburster",
    "xeno_runner",
    "xeno_praetorian",
    "xeno_stalker",
]
miniboss = "xeno_queen"

signature_traversal = "phase"
signature_perks = ["gloom_shroud", "last_stand", "iron_will"]

[spawn_weights]
facehugger = 5
xeno_drone = 3
xeno_warrior = 5
chestburster = 2
xeno_runner = 3
xeno_praetorian = 2
xeno_stalker = 2

# ═══════════════════════════════════════════════════════════════════
# Unit roster.
# ═══════════════════════════════════════════════════════════════════

# Facehugger — the conversion engine. Floodling-backed, sprints at
# hosts and attaches. Faster than the default Floodling (canon: they
# move FAST) and uses the parasite team tagging.
[units.facehugger]
archetype = "floodling"
display_name = "Facehugger"
speed = 32.0
sprite = "facehugger.art"
[units.facehugger.palette]
B = "#d8c8a0"
E = "#1a0a14"
L = "#6a5a48"
T = "#4a3a28"

# Xenomorph Drone — post-conversion combat form. Flood-archetype backed
# for the "team=flood, attacks everyone" chaos. Sleek black chitin,
# elongated skull, tail thrash.
[units.xeno_drone]
archetype = "flood"
display_name = "Xenomorph Drone"
hp = 95
speed = 20.0
touch_damage = 24
sprite = "xeno_drone.art"
[units.xeno_drone.palette]
H = "#3a3a44"
B = "#0a0a14"
S = "#4a8a60"
T = "#1a1a24"
D = "#000004"
C = "#000000"

# Xenomorph Warrior — the ridged-skull pouncer. Leaper-backed for the
# "out-of-nowhere skitter-pounce" moment. Ridged dorsal crest
# distinguishes it from the smoother Drone.
[units.xeno_warrior]
archetype = "leaper"
display_name = "Xenomorph Warrior"
hp = 80
speed = 18.0
touch_damage = 26
sprite = "xeno_warrior.art"
[units.xeno_warrior.palette]
R = "#3a3a44"
B = "#0a0a14"
S = "#4a8a60"
T = "#1a1a24"
D = "#000004"
C = "#000000"

# Chestburster — the freshly-emerged young form. FloodCarrier-backed
# because it bursts into more Facehuggers on death (same venting
# mechanic as the Flood brand). Fragile but spawns pressure.
[units.chestburster]
archetype = "flood_carrier"
display_name = "Chestburster"
hp = 35
speed = 22.0
sprite = "chestburster.art"
[units.chestburster.palette]
B = "#d8c0a8"
D = "#3a281c"
S = "#6a1828"
T = "#8a7048"
C = "#1a0a08"

# Xenomorph Runner — quadruped dog-alien from the Alien 3 lineage.
# Zergling-backed (paper HP, blazing speed) — reads as the swarm
# that hits like a truck when they cluster.
[units.xeno_runner]
archetype = "zergling"
display_name = "Xenomorph Runner"
hp = 28
speed = 32.0
touch_damage = 10
sprite = "xeno_runner.art"
[units.xeno_runner.palette]
H = "#2a2a34"
B = "#080810"
S = "#4a8a60"
T = "#14141c"
C = "#000000"

# Xenomorph Praetorian — charged armored bull-form from the hive
# lineage. Charger-backed — pure ram-through-walls threat.
[units.xeno_praetorian]
archetype = "charger"
display_name = "Xenomorph Praetorian"
hp = 150
speed = 22.0
touch_damage = 24
sprite = "xeno_praetorian.art"
[units.xeno_praetorian.palette]
H = "#38384a"
B = "#0a0a14"
S = "#4a8a60"
T = "#1a1a24"
D = "#000004"
P = "#60606a"
C = "#000000"

# Xenomorph Stalker — ceiling-drop ambusher. Phaser-backed so it
# flickers across the arena and lands next to the player. The "it
# was on the ceiling the whole time" jumpscare.
[units.xeno_stalker]
archetype = "phaser"
display_name = "Xenomorph Stalker"
hp = 55
speed = 10.0
touch_damage = 22
sprite = "xeno_stalker.art"
[units.xeno_stalker.palette]
H = "#2a2a38"
B = "#080810"
S = "#4a8a60"
T = "#14141c"
C = "#000000"

# Xenomorph Queen — the hive matriarch. Miniboss archetype wrapper.
[units.xeno_queen]
archetype = "miniboss"
display_name = "Xenomorph Queen"
hp = 1100
speed = 8.0
touch_damage = 42
sprite = "xeno_queen.art"
[units.xeno_queen.palette]
R = "#2a2a38"
B = "#080810"
S = "#4a8a60"
T = "#1a1a24"
D = "#000004"
C = "#000000"
