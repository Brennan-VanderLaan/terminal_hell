# Tarkov — Scavs + PMCs. Patient riflemen, armored operators,
# occasional Killa boss encounters. The "loud shots, loot the mag"
# brand.

id = "tarkov_scavs"
name = "Tarkov — Scavs + Operators"
description = "Patient scav fire teams. Rare Killa sightings mean run."

spawn_pool = ["rusher", "marksman", "pmc", "sentinel", "killa", "sapper"]
miniboss = "killa"

# Grounded mil-sim movement → slide. Perk pool biases toward
# survivability + sustained trigger discipline: more armor, flanks
# that punch past low-HP moments, QuickHands to win the cross-map
# trade.
signature_traversal = "slide"
signature_perks = ["survivor", "last_stand", "quick_hands"]

[spawn_weights]
# Fodder scavs — the "player-1 Mosin" tier.
rusher = 3
# Tactical long-range riflemen — THE Tarkov sniper fantasy. Weight
# bumped so a scav sightline from across the arena feels real, not
# rare. Paired with the extended 2.4× engagement range in
# try_ranged_attack, marksmen now credibly threaten from >200 tiles.
marksman = 5
# PMCs close the gap in kit.
pmc = 3
# Fixed DSHK positions — long-range sniper turrets. Preferred
# distance cranked to 120 so they set up in a corner + shoot across
# the arena.
sentinel = 2
# Killa rolls into the pool late-wave.
killa = 1
# Scav with a pipe-bomb.
sapper = 1

# ── Brand sprite overrides ─────────────────────────────────────────
# Muddy brown-beige scav fodder, plated BEAR/USEC operators.
# Killa keeps his hardcoded sprite (already bespoke). Art files
# in content/core/art/tarkov_scavs/.

[sprite_overrides]
rusher = "scav.art"
marksman = "scav_sniper.art"
pmc = "operator.art"

