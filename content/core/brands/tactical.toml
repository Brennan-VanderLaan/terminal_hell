# Tactical mil-sim brand: Arma / Tarkov / STALKER / MGS / GZW.
# Slow enemies with teeth. Ranged dominance; patient riflemen and
# armored PMCs. Opens grounded and recognizable.

id = "tactical"
name = "Tactical Mil-sim"
description = "Patient riflemen, suppressive fire, armored operators."

spawn_pool = ["rusher", "marksman", "pmc"]
miniboss = "miniboss"

[scaling]
# Lower base count than FPS — enemies hit harder, so density is gated.
base_rushers = 2
rushers_per_wave = 1
pinkie_start_wave = 99        # not in this pool
pinkie_base = 0
pinkie_scale_denom = 1
# Reusing the charger slot for marksmen — same wave-scaling logic.
charger_start_wave = 2
charger_base = 1
charger_scale_denom = 2
revenant_start_wave = 3
revenant_base = 1
revenant_scale_denom = 3

[spawn_weights]
rusher = 2
marksman = 3
pmc = 3
