# STALKER — The Zone. Bloodsuckers pouncing from cover, anomalies +
# mutants, paranoid hiding mercs. Sneak + Leaper heavy — every shape
# on your screen is either predator or prey.

id = "stalker_zone"
name = "STALKER — The Zone"
description = "Cover-hugging mercs, pouncing mutants, radiation paranoia."

spawn_pool = ["marksman", "leaper", "pinkie", "pmc", "howler", "orb", "phaser", "sentinel"]
miniboss = "miniboss"

# Anomaly-walking flavor → Phase (slip through one radiation wall
# before it melts you). Perks lean into the Zone's attrition loop:
# GloomShroud because the Zone LEAKS, IronWill for sanity regen
# during the night walks, Bloodhound to heal off the blood trails
# you leave behind.
signature_traversal = "phase"
signature_perks = ["gloom_shroud", "iron_will", "bloodhound"]

[spawn_weights]
# Snipers across the wasteland — Zone riflemen at extreme range.
marksman = 4
# Bloodsuckers + Controllers pouncing from cover. The signature
# archetype of this brand — bumped so jumps land every wave.
leaper = 5
# Pinkie-class mutants.
pinkie = 2
# Monolith / bandit squads.
pmc = 2
# Distant anomaly shrieks drawing the swarm.
howler = 1
# Floating anomalies.
orb = 2
# Controller-style psychic phase — the Zone plays tricks.
phaser = 3
# Fixed Monolith marksman in a watchtower.
sentinel = 1

# Brand-specific sprite overrides. Gas-masked mercs with scoped
# Mosins, white-hooded Monolithians with GP-25-underslung AKs,
# tentacle-faced Bloodsuckers in translucent cloaks, gorilla-armed
# Pseudogiants, shimmering anomaly orbs. Palette: muted olive,
# concrete gray, sickly radiation yellow-green.
[sprite_overrides]
marksman = "merc.art"
pmc = "monolithian.art"
leaper = "bloodsucker.art"
pinkie = "pseudogiant.art"
orb = "anomaly.art"

