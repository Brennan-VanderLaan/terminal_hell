# Rimworld — Mechanoid Raid. Cold clean firing lines, centipedes
# tanking + laying down hitscan suppression, scythers closing fast.
# The "structural threat" brand — Juggernaut + Sentinel do the bulk
# work, Breacher teardowns open your killbox from the wrong side.

id = "rimworld_mechs"
name = "Rimworld — Mechanoid Raid"
description = "Clinical mech attackers. Suppressive fire + plate armor."

spawn_pool = ["sentinel", "juggernaut", "marksman", "breacher", "rocketeer"]
miniboss = "miniboss"

# Teleport-psycast flavor → Blink. Perks are the RimWorld raid-prep
# loadout: Survivor armor vest, Butcher because every corpse is a
# loot shelf, QuickHands for the sustained shootout.
signature_traversal = "blink"
signature_perks = ["survivor", "butcher", "quick_hands"]

[spawn_weights]
sentinel = 3
juggernaut = 2
# Scyther-style marksmen.
marksman = 3
# Breacher — mechanoid diabolus breaching wall.
breacher = 2
rocketeer = 1

# ── Brand sprite overrides ─────────────────────────────────────────
# Mechanoid raid: pure constructed silhouettes — gunmetal steel +
# warning-orange accents + single red eye slit per chassis. No
# mandibles, no chitin, no curves. Every unit reads "machined."
# Art lives in content/core/art/rimworld_mechs/.
# Palette keys: P = armor plate, A = chassis, B = body core,
# E = eye slit (red), W = weapon barrel, S = strut/servo leg,
# G = warning accent, O = orange running light.

[sprite_overrides]
sentinel = "centipede.art"
juggernaut = "centurion.art"
marksman = "scyther.art"
breacher = "diabolus.art"
rocketeer = "pikeman.art"

# Centipede — long segmented chassis, heavy chargun off the front,
# three red eye slits along the spine, tread-servos beneath each seg.
[sprite_palettes.sentinel]
P = "#4a5058"
E = "#ff2018"
S = "#2a2a2e"
W = "#5a5a60"
G = "#ff8020"
A = "#1a1a1e"

# Centurion — massive quadrupedal bulk, heavy plate armor stacked in
# concentric rings, orange running lights on each flank.
[sprite_palettes.juggernaut]
P = "#585e66"
A = "#2a2e34"
S = "#1a1a1e"
E = "#ff2818"
O = "#ff8020"

# Scyther — thin bipedal, one blade arm (B) and one accelerator rifle
# arm (W). Sterile silver plate with a red visor eye.
[sprite_palettes.marksman]
A = "#787880"
B = "#484850"
P = "#383840"
E = "#ff2818"
W = "#5a5a60"
O = "#ff9030"

# Mech-Diabolus — stubby wall-shatter frame, massive hammer arm (W)
# cantilevered off the right shoulder, twin running lights.
[sprite_palettes.breacher]
P = "#3a4048"
A = "#1a1e24"
E = "#ff2818"
W = "#6a5030"
O = "#ff8020"
S = "#0a0a0e"

# Pikeman — tall thin mech with a charge-blaster pole weapon held
# vertically along the right side (W = shaft, G = emitter crystal).
[sprite_palettes.rocketeer]
A = "#68707a"
B = "#38383e"
P = "#484850"
E = "#ff2818"
W = "#5a5a60"
G = "#80c8ff"
O = "#ff8020"
