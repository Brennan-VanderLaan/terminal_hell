# Rimworld — Mechanoid Raid. Cold clean firing lines, Centipedes
# tanking + laying down hitscan suppression, Scythers closing fast
# with monosword arms, Centurions stomping into melee, Diaboluses
# cracking wall-breaches, Pikemen sniping at extreme range. The
# "structural threat" brand — mechs never panic.
#
# Converted to BrandUnit authoring shape. Each mechanoid gets a
# distinct firing profile so the "triple Centipede wall of fire"
# reads different from "a single Pikeman zapping you from across
# the map."

id = "rimworld_mechs"
name = "Rimworld — Mechanoid Raid"
description = "Clinical mech attackers. Suppressive fire + plate armor."

spawn_pool = [
    "centipede",
    "centurion",
    "scyther",
    "diabolus",
    "pikeman",
    "lancer",
]
miniboss = "diabolus_heavy"

signature_traversal = "blink"
signature_perks = ["survivor", "butcher", "quick_hands"]

[spawn_weights]
centipede = 3
centurion = 2
scyther = 3
pikeman = 2
diabolus = 2
lancer = 2

# ═══════════════════════════════════════════════════════════════════
# Unit roster.
# ═══════════════════════════════════════════════════════════════════

# Centipede — long segmented chassis with heavy chargun. Sentinel-
# backed (stationary hitscan) with the chargun burst-fire profile —
# sustained suppression across the kill-zone.
[units.centipede]
archetype = "sentinel"
display_name = "Centipede"
hp = 260
ranged_damage = 14
preferred_distance = 100.0
sprite = "centipede.art"
[units.centipede.palette]
P = "#4a5058"
E = "#ff2018"
S = "#2a2a2e"
W = "#5a5a60"
G = "#ff8020"
A = "#1a1a1e"
[units.centipede.ranged_profile]
# Chargun — 8-round burst, mid reload. That corner is a kill-zone.
tell = 0.3
shot_cooldown = 0.16
mag_size = 8
reload = 2.6

# Centurion — massive quadrupedal plate-armor bulk. Juggernaut-backed;
# plows forward, smashes walls.
[units.centurion]
archetype = "juggernaut"
display_name = "Centurion"
hp = 540
speed = 6.5
touch_damage = 36
sprite = "centurion.art"
[units.centurion.palette]
P = "#585e66"
A = "#2a2e34"
S = "#1a1a1e"
E = "#ff2818"
O = "#ff8020"

# Scyther — thin bipedal, one blade arm + one accelerator-rifle arm.
# Marksman-backed with a precise accelerator profile (single shot,
# long range, clean burst).
[units.scyther]
archetype = "marksman"
display_name = "Scyther"
hp = 110
speed = 14.0
ranged_damage = 22
preferred_distance = 80.0
sprite = "scyther.art"
[units.scyther.palette]
A = "#787880"
B = "#484850"
P = "#383840"
E = "#ff2818"
W = "#5a5a60"
O = "#ff9030"
[units.scyther.ranged_profile]
tell = 0.5
shot_cooldown = 1.8
mag_size = 2
reload = 1.6

# Diabolus — stubby wall-shatter frame, hammer-cannon arm. Breacher-
# backed (smashes walls, huge touch damage).
[units.diabolus]
archetype = "breacher"
display_name = "Diabolus"
hp = 240
speed = 9.0
touch_damage = 30
sprite = "diabolus.art"
[units.diabolus.palette]
P = "#3a4048"
A = "#1a1e24"
E = "#ff2818"
W = "#6a5030"
O = "#ff8020"
S = "#0a0a0e"

# Pikeman — tall thin mech with a charge-blaster pole weapon.
# Rocketeer-backed with a slow heavy bolt (long-range artillery).
[units.pikeman]
archetype = "rocketeer"
display_name = "Pikeman"
hp = 140
speed = 8.0
preferred_distance = 90.0
sprite = "pikeman.art"
[units.pikeman.palette]
A = "#68707a"
B = "#38383e"
P = "#484850"
E = "#ff2818"
W = "#5a5a60"
G = "#80c8ff"
O = "#ff8020"
