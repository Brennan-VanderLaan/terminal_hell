# Soulsborne brand — Dark Souls / Elden Ring / Bloodborne invaders.
# Rare but lethal. One wanders in and shifts the fight. Killa is the
# definitional invader — heavy, armed to the teeth, aggressive
# closure; used as the brand's miniboss. Black Knights, Painting
# Archers, Havel Knights, and Basilisks fill the lesser-duelist
# roles. Low volume, high threat per spawn.
#
# Converted to BrandUnit authoring shape.

id = "soulsborne_invader"
name = "Invader"
description = "Rare but lethal duelists. One is already enough to worry about."

spawn_pool = [
    "black_knight",
    "painting_archer",
    "havel_knight",
    "basilisk",
    "silver_knight",
    "giant_slave",
]
miniboss = "soulsborne_killa"

signature_traversal = "grapple"
signature_perks = ["last_stand", "gloom_shroud", "adrenaline"]

[spawn_weights]
black_knight = 3
painting_archer = 3
silver_knight = 2
havel_knight = 2
basilisk = 2
giant_slave = 1
soulsborne_killa = 1

# ═══════════════════════════════════════════════════════════════════
# Unit roster.
# ═══════════════════════════════════════════════════════════════════

# Black Knight — full plate, greatsword on shoulder, fluttering cape.
# PMC-backed; armored, heavy melee, no ranged.
[units.black_knight]
archetype = "pmc"
display_name = "Black Knight"
hp = 260
speed = 10.0
touch_damage = 32
ranged_damage = 0
sprite = "black_knight.art"
[units.black_knight.palette]
B = "#3a3a44"
D = "#18181e"
E = "#ff3818"
C = "#c8a648"
S = "#60482a"

# Painting Archer — robed crossbow marksman. Marksman-backed with a
# slow deliberate bolt (Painting Guardians fire on a long cadence).
[units.painting_archer]
archetype = "marksman"
display_name = "Painting Archer"
hp = 55
speed = 8.0
ranged_damage = 34
preferred_distance = 90.0
sprite = "painting_archer.art"
[units.painting_archer.palette]
M = "#e8e0c8"
B = "#2a2028"
D = "#18100c"
E = "#181010"
W = "#6a5030"
S = "#402820"
[units.painting_archer.ranged_profile]
tell = 1.3
shot_cooldown = 4.0
mag_size = 1
reload = 0.0

# Silver Knight — the archer/swordsman that holds line positions.
# Sentinel-backed variant (stationary hitscan with a greatbow profile).
[units.silver_knight]
archetype = "sentinel"
display_name = "Silver Knight"
hp = 180
ranged_damage = 26
preferred_distance = 110.0
[units.silver_knight.ranged_profile]
tell = 1.0
shot_cooldown = 2.8
mag_size = 1
reload = 0.0

# Havel Knight — stone-dragon-tooth armor, greatshield, great-hammer.
# Juggernaut-backed; slow, plow-through-walls, monstrous HP.
[units.havel_knight]
archetype = "juggernaut"
display_name = "Havel Knight"
hp = 520
speed = 6.0
touch_damage = 38
sprite = "havel_knight.art"
[units.havel_knight.palette]
B = "#4a4038"
D = "#1a1410"
E = "#d8a040"
H = "#786050"
S = "#3a2818"

# Basilisk — squat bulging-eye frog-thing, petrifying gaze. Leaper-
