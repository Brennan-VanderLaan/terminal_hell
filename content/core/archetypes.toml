hit_radius = 4.0
reach = 3.2
tags = ["biological", "flesh", "heavy"]
body_on_death = "spawn_big_blood"
# A fat Pinkie dying should redecorate the room.
gore_profile = "extreme"
# Close-range bruiser → pump-shotgun drops that shred the next one.
signature_primitives = ["breach", "shield_break"]
signature_fire_mode = "pump"

[charger]
