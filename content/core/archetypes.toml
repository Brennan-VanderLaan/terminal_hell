# Core archetype stats. Keys match the Rust `Archetype` enum variants
# (snake_case). Editable without recompiling — tuning lives here.
#
# - hp:            starting HP
# - speed:         pixels per second
# - touch_damage:  melee damage on contact (0 = no melee)
# - hit_radius:    collider radius in pixels for projectile hits
# - reach:         melee reach in pixels (falls back to hit_radius + 0 if absent)
# - preferred_distance: ranged stand-off distance; 0 means close aggressively
# - ranged_damage: hitscan damage for ranged units (0 = non-ranged)
#
# Drop signatures (optional, but every archetype in this file defines
# both so miniboss + regular-kill weapon drops feel like loot from
# that specific enemy — a Sentinel drops rail+pierce, a Rocketeer
# drops pump+breach, etc):
# - signature_primitives: list of snake_case Primitive ids — pool the
#   per-slot roll samples (with replacement). Missing = global pool.
# - signature_fire_mode:  one of pulse / auto / burst / pump / rail.
#   Missing = random per drop.

[rusher]
hp = 60
speed = 22.0
touch_damage = 10
hit_radius = 2.2
reach = 2.2
art = "rusher.art"
tags = ["biological", "flesh"]
body_on_death = "spawn_blood"
gore_profile = "standard"
signature_primitives = ["ignite"]
signature_fire_mode = "auto"

[rusher.palette]
H = "#c82828"
B = "#ff3c3c"
E = "#ffe678"
D = "#821428"

[pinkie]
hp = 140
speed = 15.0
touch_damage = 18
hit_radius = 4.0
reach = 3.2
tags = ["biological", "flesh", "heavy"]
body_on_death = "spawn_big_blood"
# A fat Pinkie dying should redecorate the room.
gore_profile = "extreme"
# Close-range bruiser → pump-shotgun drops that shred the next one.
signature_primitives = ["breach", "shield_break"]
signature_fire_mode = "pump"

[charger]
hp = 85
speed = 28.0
touch_damage = 18
hit_radius = 3.0
reach = 2.8
tags = ["biological", "fast", "heavy"]
gore_profile = "heavy"
# Bullrushers → wall-breach shotguns.
signature_primitives = ["breach", "ricochet"]
signature_fire_mode = "pump"

[revenant]
hp = 55
# Doom Revenant — strafes fast between rocket bursts. Bump from
# 12 → 15 so the twin-cannon rhythm reads as mobile, not plodding.
speed = 15.0
touch_damage = 8
hit_radius = 2.6
reach = 2.4
preferred_distance = 42.0
# Lower per-shot damage since the burst fires 2 rockets in quick
# succession (vs one slow shot before). Burst total stays aggressive.
ranged_damage = 12
tags = ["undead", "ranged"]
# Undead — shatters into bone dust, not blood.
body_on_death = "spawn_bone_dust"
# Skeletal long-range caster — drops pierce-rails.
signature_primitives = ["pierce", "chain"]
signature_fire_mode = "rail"

[marksman]
hp = 45
# Sniper — deliberate, takes position. Slower move speed sells the
# "set up, scope in, shoot" rhythm. Ranged profile uses 0.85s tell
# + 3.5s cooldown, so snipers are rare but heavy-hitting.
speed = 7.0
touch_damage = 6
hit_radius = 2.4
reach = 2.0
# True-sniper range. Marksmen + Sentinels get a 2.4× engagement-
# range multiplier in Enemy::try_ranged_attack, so a 90 preferred
# distance = ~216-tile engagement range. That lets a sniper set up
# on the arena's far edge and credibly threaten from there, instead
# of creeping into mid-range to fire.
preferred_distance = 90.0
# Bumped from 26 → 32 to compensate for the longer 3.5s cooldown
# per shot — a sniper that lands less often should punch harder
# when it does connect.
ranged_damage = 32
tags = ["biological", "ranged"]
# The definitional rail-drop archetype (per spec).
signature_primitives = ["pierce", "shield_break"]
signature_fire_mode = "rail"

[pmc]
hp = 210
speed = 11.0
touch_damage = 22
hit_radius = 4.5
reach = 3.4
tags = ["biological", "armored", "heavy"]
gore_profile = "heavy"
# Armored operator — drops anti-armor autos.
signature_primitives = ["shield_break", "pierce"]
signature_fire_mode = "auto"

[swarmling]
hp = 18
speed = 30.0
touch_damage = 6
hit_radius = 1.6
reach = 1.6
tags = ["biological", "small", "flammable"]
# Fire-bug: burn ring stays (gameplay — AoE damage on death) and
# the ignite_aura reaction plants a scorch pool automatically.
body_on_death = "ignite_aura"
gore_profile = "standard"
# Fire-bug — drops ignite + contagion autos that cascade through the swarm.
signature_primitives = ["ignite", "contagion"]
signature_fire_mode = "auto"

[orb]
hp = 90
speed = 11.0
touch_damage = 14
hit_radius = 3.2
reach = 3.0
tags = ["arcane", "floating", "volatile"]
# Orbs pop with a violet psychic shockwave instead of a physical
# blast — ties the arcane feel to both the gameplay (chain-damage
# to nearby enemies, previously explode_small with just damage + scorch)
# and the visual (violet residue puddle). Damage ring stays loud
# via shock_chain: 3.5-tile radius, 18 damage, chains to 3 targets.
body_on_death = "shock_chain"
# Orbs pop with a violet meat storm that doesn't match their silhouette.
gore_profile = "heavy"
# Arcane floater → chain + gravity well pulse weapons.
signature_primitives = ["chain", "gravity_well"]
signature_fire_mode = "pulse"

[miniboss]
hp = 550
speed = 9.0
touch_damage = 30
hit_radius = 6.5
reach = 5.0
tags = ["biological", "heavy", "necromantic"]
body_on_death = "explode_big"
# Miniboss death = screen-filling meat rain + wall splatter in every direction.
gore_profile = "extreme"
# Generic miniboss drops burst-fire kits with overdrive + chain so
# the reward feels like a step up from trash-mob drops.
signature_primitives = ["overdrive", "chain", "ricochet"]
signature_fire_mode = "burst"

# Breacher: smashes walls to reach you. A* pathfinding finds a route;
# if the shortest path runs through a wall, the Breacher attacks the
# wall with a telegraphed wind-up and opens a new corridor. Creates
# dynamic chokepoints that survivors didn't plan for.
[breacher]
hp = 180
speed = 10.0
touch_damage = 24
hit_radius = 3.2
reach = 3.0
tags = ["biological", "heavy", "breacher"]
body_on_death = "spawn_big_blood"
gore_profile = "heavy"
# Wall-wrecker flavor → breach/ricochet pump drops.
signature_primitives = ["breach", "ricochet"]
signature_fire_mode = "pump"

# Rocketeer: stays at standoff range, fires explosive projectiles that
# fly through the world and detonate. Rockets carry the primitive
# framework (ignite / breach / chain / pierce modifiers apply to the
# explosion radius + follow-on effects).
[rocketeer]
hp = 70
# Rocket grunt — mobile enough to reposition between shots rather
# than planting for the whole engagement. 9 → 11 gets them moving.
speed = 11.0
touch_damage = 4
hit_radius = 2.6
reach = 2.4
preferred_distance = 38.0
ranged_damage = 0
tags = ["tactical", "rocketeer"]
body_on_death = "spawn_blood"
gore_profile = "heavy"
# Spec callout: rocketeers drop breach + ignite pulse weapons.
signature_primitives = ["breach", "ignite"]
signature_fire_mode = "pulse"

# Killa: Tarkov-homage boss. Heavy armor, LMG, grenade lobs, aggressive
# pushes on survivors. 60-round mag with forced reloads — the reload
# windows are the "fall back and breathe" moments. Should feel like
# a menacing mid-range pressure source.
[killa]
hp = 900
speed = 14.0
touch_damage = 28
hit_radius = 5.0
reach = 3.0
# Aggressive push-range LMG — mid-30s preferred but still shoots far.
preferred_distance = 30.0
ranged_damage = 14
tags = ["biological", "armored", "heavy", "boss"]
body_on_death = "spawn_big_blood"
gore_profile = "extreme"
# Boss LMG → overdrive + shield-break + breach auto kits.
signature_primitives = ["overdrive", "shield_break", "breach"]
signature_fire_mode = "auto"

# Zergling: StarCraft-homage swarm. Tiny, fast, fragile. Spawns in
# bursts via the director burst-spawn multiplier so when you see one,
# you see a dozen a second later.
[zergling]
hp = 14
speed = 36.0
touch_damage = 5
hit_radius = 1.5
reach = 1.5
tags = ["biological", "swarm", "agile"]
gore_profile = "standard"
signature_primitives = ["ignite", "chain"]
signature_fire_mode = "auto"

# Floodling: Halo-homage parasite. Small, fast, low HP. On melee
# contact with a Horde enemy, converts that enemy to the Flood
# faction and dies itself. Contact with a player deals small damage
# and kills the Floodling.
[floodling]
hp = 18
speed = 28.0
touch_damage = 4
hit_radius = 1.8
reach = 1.8
tags = ["parasite", "infectious"]
# Parasite splat — small green ichor dab, not red human blood.
body_on_death = "spawn_ichor"
gore_profile = "standard"
# Parasite → contagion + acid pulse drops (DoT spreaders).
signature_primitives = ["contagion", "acid"]
signature_fire_mode = "pulse"

# Flood: converted host — faction flipped, attacks every non-Flood
# thing (players AND regular enemies). Doesn't spawn directly;
# only appears via Floodling conversion.
[flood]
hp = 85
speed = 18.0
touch_damage = 22
hit_radius = 2.8
reach = 2.4
tags = ["flood", "infected", "feral"]
# Infected combat form — big green ichor puddle. The visual that
# says "this room has Flood in it" without reading an enemy
# nameplate.
body_on_death = "spawn_big_ichor"
gore_profile = "heavy"
signature_primitives = ["contagion", "acid"]
signature_fire_mode = "auto"

# Flood carrier form — slow bloated walking sac. On death vents a
# burst of Floodlings (Halo lore). Adds a kamikaze-caster option to
# the Flood faction besides direct combat.
[flood_carrier]
hp = 60
speed = 8.0
touch_damage = 10
hit_radius = 3.4
reach = 3.0
tags = ["flood", "carrier", "volatile"]
body_on_death = "burst_floodlings"
gore_profile = "heavy"
# Walking biomass bomb → contagion + breach pump drops.
signature_primitives = ["contagion", "breach"]
signature_fire_mode = "pump"

# Sapper: walking bomb. Runs at walls or players; when adjacent it
# telegraphs a fuse and detonates in a breach-style explosion. Another
# wall-breaker variant — louder and wider than the Breacher's smash.
[sapper]
hp = 35
speed = 18.0
touch_damage = 0
hit_radius = 2.2
reach = 2.0
tags = ["biological", "volatile", "breacher"]
body_on_death = "explode_big"
gore_profile = "heavy"
# Suicide bomber → breach + ignite pulse drops.
signature_primitives = ["breach", "ignite"]
signature_fire_mode = "pulse"

# Juggernaut: slow armored hulk. No pathfinding — just plows forward,
# smashing any wall in its way. The third wall-breaker flavor: low
# skill ceiling but inevitable.
[juggernaut]
hp = 480
speed = 6.5
touch_damage = 34
hit_radius = 5.8
reach = 4.2
tags = ["mechanical", "heavy", "armored", "breacher"]
# Armored mech — bleeds dark oil, not blood. Heavy gore profile
# for the wreckage spread when it finally drops.
body_on_death = "spawn_oil"
gore_profile = "heavy"
# Armored hulk → pierce + overdrive auto drops (anti-armor).
signature_primitives = ["pierce", "overdrive"]
signature_fire_mode = "auto"

# Howler: support / noise-caller. Stays away from combat, shrieks on a
# cadence. Each shriek spawns a big noise event that draws nearby
# enemies toward its position — the horde coordinator.
[howler]
hp = 40
speed = 9.0
touch_damage = 0
hit_radius = 2.2
reach = 2.0
tags = ["cultist", "support", "noisy"]
body_on_death = "spawn_blood"
gore_profile = "standard"
# Cultist caster → contagion + gravity-well pulse drops.
signature_primitives = ["contagion", "gravity_well"]
signature_fire_mode = "pulse"

# Sentinel: stationary hitscan turret. Long range, telegraphed shots,
# doesn't move. Can be flanked and demolished.
[sentinel]
hp = 160
speed = 0.0
touch_damage = 0
hit_radius = 3.0
reach = 0.0
# Fixed turret — shoots the farthest of any unit. 120 × 2.4 multiplier
# = ~288-tile engagement range, so a Sentinel dug into a corner of
# the 1200×800 arena is a credible threat across the middle of it.
preferred_distance = 120.0
ranged_damage = 22
tags = ["mechanical", "turret"]
# Mechanical wreck — leaks oil, not blood.
body_on_death = "spawn_oil"
gore_profile = "standard"
# Long-range turret → pierce + shield-break rail drops.
signature_primitives = ["pierce", "shield_break"]
signature_fire_mode = "rail"

# Splitter: low HP, dies fast — but when killed, spawns 3 Swarmlings
# at the corpse. A pressure-multiplier. Can chain-cascade if the
# swarmlings happen to land near other Splitters.
[splitter]
hp = 45
speed = 13.0
touch_damage = 8
hit_radius = 2.6
reach = 2.2
tags = ["biological", "fragmenting"]
body_on_death = "spawn_swarmlings"
gore_profile = "heavy"
# Fragmenter → contagion + chain burst drops.
signature_primitives = ["contagion", "chain"]
signature_fire_mode = "burst"

# Phaser: short-range teleport stalker. Briefly shimmers in place
# (telegraph), then snaps 6-9 tiles through the air toward the
# player. Fragile but very hard to pin down; lands next to you and
# swings once before the next cooldown starts. Fills the "something
# phases past you" slot — arcane/ambusher flavor.
[phaser]
hp = 42
speed = 9.0
touch_damage = 20
hit_radius = 2.2
reach = 2.0
tags = ["arcane", "agile", "phaser"]
# Arcane — no blood. Leaves a violet psychic-residue puddle,
# bloom-capable, tying Phaser deaths into the Carcosa palette.
body_on_death = "spawn_psychic_residue"
gore_profile = "standard"
signature_primitives = ["gravity_well", "chain"]
signature_fire_mode = "pulse"

# Leaper: prowls slowly, telegraphs a wind-up, then sprints in a
# straight line at 4× speed before crashing into recovery. Ambush
# predator — Bloodsuckers, Smokers, Slashers, Pouncers all fit.
[leaper]
hp = 58
speed = 14.0
touch_damage = 22
hit_radius = 2.4
reach = 2.2
tags = ["biological", "agile", "ambusher"]
body_on_death = "spawn_blood"
gore_profile = "heavy"
# Pouncer → siphon + ricochet pulse drops (high-mobility loop).
signature_primitives = ["siphon", "ricochet"]
signature_fire_mode = "pulse"

# Player-deployable turret. Spawns from consuming a TurretKit pickup
# with the T key. Team = "survivor", hostiles = ["horde", "flood"]
# so it fires at enemies and enemies fire back. Doesn't appear in
# regular brand spawn pools.
[player_turret]
hp = 140
speed = 0.0
touch_damage = 0
hit_radius = 3.2
reach = 0.0
preferred_distance = 28.0
ranged_damage = 18
tags = ["mechanical", "ally", "turret"]
# Mechanical wreck — leaks oil when destroyed.
body_on_death = "spawn_oil"
gore_profile = "standard"
# Player turrets don't normally drop loot — but if future content
# wants them to, auto pierce rails fit the aesthetic.
signature_primitives = ["pierce"]
signature_fire_mode = "auto"

# Emergent boss: the Corpse-Eater. Spawns only from a rare interaction
# (necromantic body dying near corpses) — never from regular waves.
# Starts moderate, grows by consuming corpses, rampages once fed.
[eater]
hp = 320
speed = 8.0
touch_damage = 40
hit_radius = 5.0
reach = 4.5
tags = ["abomination", "necromantic", "hungry"]
# No body_on_death — dying Eaters just drop blood like anything else
# doesn't, because the raise logic triggers off necromantic+corpse.
# But when it DOES die, it dumps everything it's eaten.
gore_profile = "extreme"
# Corpse-feeder boss → siphon + overdrive + chain burst drops.
signature_primitives = ["siphon", "overdrive", "chain"]
signature_fire_mode = "burst"

# ═══════════════════════════════════════════════════════════════════
# B4 first-content: Half-Life — Headcrab + Zombie
# ═══════════════════════════════════════════════════════════════════

# Xen parasite. Fragile, fast, leaps at living hosts and converts
# them into Zombies after a 6-second gestation (2.5s mounted + 3.5s
# deteriorating). Behavior block below declares the full Convert
# primitive with phases — spec §4.1 Behavior.md headcrab example.
# The sim doesn't yet fire LeapAttach / phased Convert (B5+ work);
# content is authored today so the authoring surface + registry
# resolution paths are exercised end-to-end.
[headcrab]
hp = 18
speed = 14.0
touch_damage = 4
hit_radius = 1.4
reach = 1.8
tags = ["biological", "parasite", "agile"]
# Dying headcrabs bleed like anything else.
body_on_death = "spawn_blood"
gore_profile = "standard"
# Parasites thematically drop contagion+siphon rolls.
signature_primitives = ["contagion", "siphon"]
signature_fire_mode = "auto"

[headcrab.palette]
# Reuse floodling palette keys — same sprite until dedicated art lands.
B = "#e6a838"
L = "#8e4a10"
E = "#ffe078"
M = "#1e0a04"
D = "#5a2808"

[headcrab.behavior]
targeter = "nearest_attachable"

[[headcrab.behavior.actions]]
kind = "leap_attach"
range = 3.5
windup = 0.35
cooldown = 1.2

[[headcrab.behavior.actions]]
kind = "convert"
trigger = "on_attach_success"
into = "zombie"
mode = "swap"
kill_host = true
into_team = "horde"
chain_cap = 1
on_host_death = "trigger_terminal"

[[headcrab.behavior.actions.phases]]
name = "mounted"
duration = 2.5
tags_add = ["infected"]
behavior_override = "panicked_host"
sprite_overlay = "headcrab_clinging"

[[headcrab.behavior.actions.phases]]
name = "deteriorating"
duration = 3.5
tags_add = ["infected", "symptomatic"]
behavior_override = "stumbling_host"
sprite_overlay = "headcrab_deteriorating"
ambient_vfx = ["blood_mist"]
speed_mult = 0.4
hp_drain_per_sec = 3.0

[[headcrab.behavior.actions]]
kind = "melee"

# Converted marine. Shambling bruiser — slower than a Rusher, hits
# harder, tagged "infected" so parasite-faction rules can key off it.
[zombie]
hp = 80
speed = 9.0
touch_damage = 14
hit_radius = 2.5
reach = 2.6
tags = ["biological", "flesh", "infected", "shambling"]
body_on_death = "spawn_big_blood"
gore_profile = "heavy"
# Zombies drop ember/breach — stumbling close-range threats.
signature_primitives = ["breach", "ignite"]
signature_fire_mode = "pump"

[zombie.palette]
# Bruised flesh-gray with yellow bite-pallor highlights.
H = "#78735c"
B = "#aaa48c"
E = "#ffe040"
D = "#3c3828"
M = "#181612"

[zombie.behavior]
targeter = "nearest_player"

[[zombie.behavior.actions]]
kind = "melee"

# ═══════════════════════════════════════════════════════════════════
# B4 first-content: Starving Rats — undercity vermin
# ═══════════════════════════════════════════════════════════════════

# Plague rat. Tiny, fast, eats corpses to grow into a dire_rat after
# 30 HP of consumed fodder. Team "swarm" — hostile to every living
# faction (survivors, horde, flood, parasite). Behavior.md §4.4 spec
# example for the Consume primitive with growth_into/growth_threshold.
[rat]
hp = 12
# Scurry vermin — faster than a Rusher (22), slower than a Zergling
# (34). 30 puts them above most melee archetypes, so a rat swarm
# crossing the floor actually feels like an unstoppable tide rather
# than a slow roll.
speed = 30.0
touch_damage = 3
hit_radius = 1.2
reach = 1.2
tags = ["biological", "swarm", "vermin", "starving"]
body_on_death = "spawn_blood"
gore_profile = "standard"
# Starving rats drop siphon primitives — they steal, they don't gift.
signature_primitives = ["siphon"]
signature_fire_mode = "auto"

[rat.palette]
# Dirty brown-grey scurry.
H = "#8c6a4a"
B = "#a8886a"
E = "#e04030"
D = "#38241a"
M = "#181008"

[rat.behavior]
targeter = "nearest_corpse"

[[rat.behavior.actions]]
kind = "consume"
targets = ["corpse", "enemy"]
range = 1.2
hp_gain = 6.0
growth_into = "dire_rat"
growth_threshold = 30

[[rat.behavior.actions]]
kind = "melee"

# Grown rat — bigger, slower, sturdier, same hostile-to-all swarm
# allegiance. Emerges via the rat's Consume growth; direct spawn is
# permitted but low-weight so most DireRats are the result of a rat
# that fed long enough to transform.
[dire_rat]
hp = 80
speed = 15.0
touch_damage = 14
hit_radius = 2.6
reach = 2.4
tags = ["biological", "swarm", "vermin", "heavy"]
body_on_death = "spawn_big_blood"
gore_profile = "heavy"
# Grown rats drop breach + siphon — the threshold-swapped threat.
signature_primitives = ["breach", "siphon"]
signature_fire_mode = "pump"

[dire_rat.palette]
# Sickly yellow-brown, eyes too bright.
H = "#a88848"
B = "#d0a858"
E = "#f0c038"
D = "#4a3824"
M = "#1a1208"

[dire_rat.behavior]
targeter = "nearest_hostile"

[[dire_rat.behavior.actions]]
kind = "melee"
