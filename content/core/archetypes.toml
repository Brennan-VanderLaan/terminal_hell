speed = 0.0
touch_damage = 0
hit_radius = 3.0
reach = 0.0
# Fixed turret — shoots the farthest of any unit.
preferred_distance = 55.0
ranged_damage = 18
tags = ["mechanical", "turret"]
gore_profile = "standard"
# Long-range turret → pierce + shield-break rail drops.
